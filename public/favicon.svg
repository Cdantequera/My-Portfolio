<svg xmlns="http://www.w3.org/2000/svg" viewBox="40 20 80 80" width="32" height="32" role="img" aria-label="Monograma A Daniel Antequera">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00F0FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066FF;stop-opacity:1" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <polygon points="78,28 106,44 106,76 78,92 50,76 50,44" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.6" filter="url(#glow)" />
  
  <polygon points="78,38 98,49 98,71 78,82 58,71 58,49" fill="none" stroke="url(#accentGrad)" stroke-width="1" opacity="0.9" />

  <rect x="73" y="49" width="3" height="25" fill="url(#accentGrad)" rx="0.5" transform="rotate(18, 68.5, 61)"/>
  <rect x="80" y="50" width="3" height="22" fill="url(#accentGrad)" rx="0.5" transform="rotate(-18, 81.5, 61)"/>
  <rect x="73" y="62" width="10" height="2.5" fill="url(#accentGrad)" rx="0.5"/>

  <g stroke="#00F0FF" stroke-width="1.2" opacity="0.5">
    <polyline points="50,54 46,54 46,46 54,46" fill="none"/>
    <polyline points="106,57 110,57 110,65 102,65" fill="none"/>
  </g>
</svg>